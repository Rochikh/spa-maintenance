<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#1a73e8">
  <title>Spa Maintenance</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>🫧 Spa Maintenance</h1>
    <nav>
      <button class="nav-btn active" data-view="dashboard">Accueil</button>
      <button class="nav-btn" data-view="history">Historique</button>
      <button class="nav-btn" data-view="settings">Réglages</button>
    </nav>
  </header>

  <main>
    <!-- Dashboard View -->
    <section id="view-dashboard" class="view active">
      <div class="analyze-section">
        <button id="btn-analyze" class="btn-primary btn-large">
          <span class="btn-icon">📸</span>
          Analyser une bandelette
        </button>
        <input type="file" id="input-camera" accept="image/*" capture="environment" hidden>
      </div>

      <!-- Loading overlay -->
      <div id="analyze-loading" class="loading-overlay hidden">
        <div class="spinner"></div>
        <p>Analyse en cours...</p>
      </div>

      <!-- Results panel -->
      <div id="results-panel" class="card hidden">
        <h2>Résultats de l'analyse</h2>
        <div id="results-grid" class="results-grid"></div>
        <div id="results-actions" class="actions-list"></div>
        <div id="results-notes" class="notes"></div>
      </div>

      <!-- Last analysis -->
      <div id="last-analysis" class="card">
        <h2>Dernier relevé</h2>
        <div id="last-analysis-content">
          <p class="empty-state">Aucune analyse enregistrée</p>
        </div>
      </div>

      <!-- Maintenance reminders -->
      <div id="maintenance-dashboard" class="card">
        <h2>Entretien</h2>
        <div id="maintenance-list"></div>
      </div>
    </section>

    <!-- History View -->
    <section id="view-history" class="view">
      <div class="card">
        <h2>Historique des analyses</h2>
        <div id="charts-container" class="charts-container"></div>
        <div class="table-wrapper">
          <table id="history-table">
            <thead>
              <tr>
                <th>Date</th>
                <th>pH</th>
                <th>TAC</th>
                <th>TH</th>
                <th>Désinfectant</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="history-body"></tbody>
          </table>
        </div>
        <p id="history-empty" class="empty-state hidden">Aucune analyse enregistrée</p>
      </div>
    </section>

    <!-- Settings View -->
    <section id="view-settings" class="view">
      <div class="card">
        <h2>Configuration</h2>
        <div class="form-group">
          <label for="setting-sanitizer">Type de désinfectant</label>
          <select id="setting-sanitizer">
            <option value="brome">Brome</option>
            <option value="chlore">Chlore</option>
          </select>
        </div>
        <div class="form-group">
          <label for="setting-volume">Volume du spa (litres)</label>
          <input type="number" id="setting-volume" value="900" min="100" max="5000">
        </div>
        <button id="btn-save-settings" class="btn-primary">Enregistrer</button>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
